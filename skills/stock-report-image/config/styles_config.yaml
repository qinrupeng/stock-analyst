# ============================================================
# 风格→参考图映射（按目录分组，中文注释说明用途+来源目录）
# 【目录优先级】同一文件多个目录存在时，按以下顺序查找：
#   cover-image-styles > article-illustrator-styles > infographic-styles > xhs-images-styles > slide-deck-styles
# 【冲突警告】以下文件在多个目录都有，内容可能不同，已在注释中标注优先使用方向
# ============================================================

style_ref_map:
  # ── 封面参考图（cover-image-styles/ 13张）───────────────────────────
  # 优先用于：A股投资机会、金融、储能锂电、黄金稀土等主赛道封面
  folder: "folder-reference.webp"           # 拟物化文件夹写字板 ★大爷最爱★（克莱因蓝+活力橙，3D微缩，米黄纸张+木质夹板）
  vintage_journal: "vintage.webp"          # 复古期刊航海日志（羊皮纸+深棕+暗金）【与article/slide重名，优先cover】
  retro_pop_grid: "retro.webp"             # 1920年代Art Deco复古波普（做旧羊皮纸，低饱和红黄蓝）【与article/xhs重名，优先cover】
  dark_atmospheric: "dark-atmospheric.webp" # 暗黑奇幻+霓虹光效（深靛蓝+霓虹品红）【与slide重名，优先cover】
  elegant: "elegant.webp"                   # 优雅古堡莫兰迪色（奶油白+陶土粉+灰蓝+金色藤蔓）【与article重名，优先cover】
  fantasy_animation: "fantasy-animation.webp" # 温馨治愈奇幻童话（淡蓝米白+金黄+森林绿）【与article/slide重名，优先cover】
  intuition_machine: "intuition-machine.webp" # 复古未来主义+达芬奇手稿（羊皮纸+湖蓝草绿赤土红）【与article/slide重名，优先cover】
  nature: "nature.webp"                     # 手绘线条大地色系（森林绿+土褐+赤陶+天蓝）【与article重名，优先cover】
  pixel_art: "pixel-art.webp"               # 像素艺术8-bit游戏（天蓝底+高饱和红黄蓝方块点阵）【与infographic/slide重名，优先article】
  sketch_notes: "sketch-notes.webp"          # 手绘涂鸦笔记本（米白+鼠尾草绿+琥珀赤陶）【与article/slide重名，优先cover】
  vector_illustration: "vector-illustration.webp" # 复古绘本牛皮纸（土黄+豆沙绿+芥末蓝灰+点阵装饰）【与article/slide重名，优先cover】
  warm: "warm.webp"                         # 手绘治愈蜡笔彩铅（米白淡黄+姜土红，莫兰迪色系）【与article/xhs重名，优先cover】
  watercolor: "watercolor.webp"             # 水彩手绘马卡龙色（淡紫柔紫+天蓝浅橙+草绿）【与article/slide重名，优先cover】

  # ── 文章插图（article-illustrator-styles/ 16张）──────────────────────
  # 优先用于：深度分析文章、技术解读等插图
  blueprint_lab: "blueprint.webp"            # 严谨蓝图技术感 ★AI算力芯片主风格★（板斯特蓝+浅灰+海军蓝）【与slide重名，优先article】
  editorial: "editorial.webp"               # 扁平现代信息图（深蓝+珊瑚红+浅蓝）【与cover重名，优先cover】
  playful: "playful.webp"                   # 手绘涂鸦卡通童趣（米白+马卡龙色彩）【未在theme_styles使用】
  sketch: "sketch.webp"                     # 手绘设计过程感（米白+炭黑+青蓝）【article独有】
  scientific: "scientific.webp"              # 现代学术信息图（米白灰蓝+亮黄）【与slide重名，优先article】
  elegant_illustration: "elegant.webp"       # 优雅插画（暖金+薄荷绿+淡橘褐）【与cover重名，优先cover】
  fantasy_anim: "fantasy-animation.webp"     # 幻想动画（柔和梦幻水彩童话）【与cover重名，优先cover】
  nature_illustration: "nature.webp"        # 自然插画（有机自然流动感）【与cover重名，优先cover】
  pixel_art_style: "pixel-art.webp"         # 像素艺术风【与cover重名，优先cover】
  sketch_notes_style: "sketch-notes.webp"    # 手绘笔记风【与cover重名，优先cover】
  warm_style: "warm.webp"                   # 温馨暖色风【与cover重名，优先cover】
  watercolor_style: "watercolor.webp"       # 水彩插画风【与cover重名，优先cover】

