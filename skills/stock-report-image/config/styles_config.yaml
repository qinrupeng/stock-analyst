# ============================================================
# 【主题标题→原始赛道关键词回退映射】
# 当主题标题(如产能爆发)在风格/图标映射中匹配不到时，
# 在此查找对应的原始赛道关键词，再用原始词匹配风格和图标
# ============================================================
theme_topic_fallback:
  产能爆发: ["商业航天", "SpaceX", "航天", "火箭"]
  避险狂热: ["黄金", "贵金属", "白银"]
  供应中断: ["油气", "油服", "原油", "石油", "能源"]
  周期拐点: ["锂电", "新能源", "储能", "电池", "锂"]

# ============================================================
# 【风格详细描述】（folder风格需要精确描述，其他风格由参考图定义）
# ============================================================
folder_style_desc: |
  拟物化写字板设计，文件夹卡片模块化布局，3D微缩场景
  米黄纸张背景，木质夹板边缘
  克莱因蓝 + 活力橙配色
  银色金属夹，圆角卡片，2.5D/3D效果
  学习参考图folder-reference.webp的风格、纹理、边框、渲染
  每个文件夹卡片顶部有彩色标签条（Tab），像真实文件夹的便签标签
  每个宫格的内容要有不同的背景纹理（电路板/晶体矿石/光伏板/原子结构/海洋等），增加视觉丰富度

# ============================================================
# 布局推荐策略（按赛道数量自动选择）
# 注意：代码最多支持6个主题（top3_bottom2/grid_2x3），不包含grid_3x3
layout_by_topic_count:
  1: "single_panel"
  2: "two_column"
  3: "three_column"
  4: "grid_2x2"
  5: "top3_bottom2"   # 5个赛道默认上3下2（大爷最爱）
  6: "grid_2x3"       # 6个主题 → 2x3六宫格

# 5赛道可选布局（大爷验证）
five_topic_layouts:
  default: "hub_spoke"          # 环形放射，5个面板围绕中心，均等夹角
  recommended: "top3_bottom2"   # 顶部3格 + 底部2格，均衡对称（大爷最爱）
  optional:
    - "hub_spoke"               # 环形放射
    - "top3_bottom2"            # 上3下2，均衡对称
    - "left4_right1"           # 左侧4格2x2 + 右侧1个大格
    - "fan_shaped"              # 扇形展开

# ============================================================
# 平台尺寸配置（自动适配对应比例）
# ============================================================
platform_aspect_ratios:
  toutiao: "16:9"   # 头条/普通封面
  xhs: "3:4"         # 小红书竖版
  wechat: "2.35:1"  # 公众号封面
  default: "16:9"

# ============================================================
# 【强制规范】公众号封面生成规则
# ============================================================
wechat_cover_rules:
  max_title_length: 13         # 公众号封面标题最多13字（确保完整显示）
  forbidden_titles:
    - "十大金股"
    - "个股精选"
    - "本周机会"
    - "每日复盘"
    - "周度报告"
    - "个股机会"
  forbidden_words:
    - "震惊"
    - "必涨"
    - "100%"
    - "暴跌"
  output_to_article_dir: true   # 强制输出到文章HTML同一目录

  title_templates:
    数字型:
      pattern: "{count}大热点机会"
      keywords: []
    痛点型:
      pattern: "避坑指南来了"
      keywords: ["风险", "回调", "下跌", "利空", "预警", "暴跌"]
    利益型:
      pattern: "稳健配置机会"
      keywords: ["稳健", "低风险", "确定性", "防御", "安全"]
    悬念型:
      pattern: "赛道分化来袭"
      keywords: ["分化", "分歧", "轮动", "切换"]
    点题型:
      pattern: "今日主线机会"
      report_patterns: ["盘前", "日度", "今日", "每日"]

# ============================================================
# 布局视觉定义（补充文字描述，方便理解）
# ============================================================
layout_definitions:
  top3_bottom2: "顶部3格横排 + 底部2格横排，均衡对称，大爷最爱"
  hub_spoke: "5个面板环形放射围绕中心，适合展示多个相关主题"
  left4_right1: "左侧4格2×2 + 右侧1个大格，适合4+1组合"
  fan_shaped: "扇形展开，上1中2下2，适合5个主题"
  grid_2x3: "2×3六宫格，6个主题均分布局"
  grid_2x2: "2×2四宫格"
  three_column: "左中右三栏"
  two_column: "左右两栏"
  single_panel: "单面板居中"

# 默认风格
default_style: "blueprint_lab"

# ============================================================
# 【新增】布局位置精确描述（供代码组装逐格提示词）
# 格式：布局名: [位置1, 位置2, ...]
# ============================================================
layout_positions:
  grid_2x3: ["上左格", "上中格", "上右格", "下左格", "下中格", "下右格"]
  hub_spoke: ["左上方（约11点方向）", "右上方（约1点方向）", "正左侧（约9点方向）", "正右侧（约3点方向）", "正下方（约6点方向）"]
  fan_shaped: ["顶部中央（扇形顶点）", "中左（扇骨左侧）", "中右（扇骨右侧）", "底左（扇骨左下）", "底右（扇骨右下）"]
  left4_right1: ["左上格", "右上格", "左下格", "右下格"]
  top3_bottom2: ["上左格", "上中格", "上右格", "下左格", "下右格"]
  grid_2x2: ["左上格", "右上格", "左下格", "右下格"]
  three_column: ["左格", "中格", "右格"]
  two_column: ["左格", "右格"]
  single_panel: ["中央区域"]

# ============================================================
# 【新增】布局组装描述（代码组装时的布局说明）
# ============================================================
layout_assembly:
  hub_spoke:
    format: "bullet"
    prefix: "5个面板围绕中心标题："
  left4_right1:
    format: "numbered_with_right"
    prefix: "左侧4格2x2网格 + 右侧1个大格："
  default:
    format: "numbered"
    prefix: ""

