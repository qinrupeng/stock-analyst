folder_style_desc: '拟物化写字板设计，文件夹卡片模块化布局，3D微缩场景

  米黄纸张背景，木质夹板边缘

  克莱因蓝 + 活力橙配色

  银色金属夹，圆角卡片，2.5D/3D效果

  学习参考图folder-reference.webp的风格、纹理、边框、渲染

  每个文件夹卡片顶部有彩色标签条（Tab），像真实文件夹的便签标签

  每个宫格的内容要有不同的背景纹理（电路板/晶体矿石/光伏板/原子结构/海洋等），增加视觉丰富度

  '
layout_by_topic_count:
  1: single_panel
  2: two_column
  3: three_column
  4: grid_2x2
  5: top3_bottom2
  6: grid_2x3
five_topic_layouts:
  default: hub_spoke
  recommended: top3_bottom2
  optional:
  - hub_spoke
  - top3_bottom2
  - left4_right1
  - fan_shaped
platform_aspect_ratios:
  toutiao: '16:9'
  xhs: '3:4'
  wechat: 2.35:1
  default: '16:9'
wechat_cover_rules:
  max_title_length: 13
  forbidden_titles:
  - 十大金股
  - 个股精选
  - 本周机会
  - 每日复盘
  - 周度报告
  - 个股机会
  forbidden_words:
  - 震惊
  - 必涨
  - 100%
  - 暴跌
  output_to_article_dir: true
  title_templates:
    数字型:
      pattern: '{count}大热点机会'
      keywords: []
    痛点型:
      pattern: 避坑指南来了
      keywords:
      - 风险
      - 回调
      - 下跌
      - 利空
      - 预警
      - 暴跌
    利益型:
      pattern: 稳健配置机会
      keywords:
      - 稳健
      - 低风险
      - 确定性
      - 防御
      - 安全
    悬念型:
      pattern: 赛道分化来袭
      keywords:
      - 分化
      - 分歧
      - 轮动
      - 切换
    点题型:
      pattern: 今日主线机会
      report_patterns:
      - 盘前
      - 日度
      - 今日
      - 每日
layout_definitions:
  top3_bottom2: 顶部3格横排 + 底部2格横排，均衡对称，大爷最爱
  hub_spoke: 5个面板环形放射围绕中心，适合展示多个相关主题
  left4_right1: 左侧4格2×2 + 右侧1个大格，适合4+1组合
  fan_shaped: 扇形展开，上1中2下2，适合5个主题
  grid_2x3: 2×3六宫格，6个主题均分布局
  grid_2x2: 2×2四宫格
  three_column: 左中右三栏
  two_column: 左右两栏
  single_panel: 单面板居中
default_style: blueprint_lab
