# ============================================================
# 【新增】文件夹风格详细描述（大爷验证）
# 风格名：folder / folder-reference.webp
# 视觉：拟物化写字板 + 3D微缩场景 + 模块化文件夹卡片
# 配色：米黄纸张背景 + 克莱因蓝/活力橙高饱和对比
# 质感：木质夹板 + 泛黄纸张 + 银色金属夹
# 适用：A股投资机会、市场分析、赛道机会类封面
# ============================================================
folder_style_desc: |
  整体：拟物化写字板设计，7个文件夹卡片模块化布局，3D微缩场景
  背景：米黄色/奶白色纸张纹理，木质夹板边缘
  配色：克莱因蓝(#0046D5) + 活力橙(#FF6B35)，高饱和对比
  质感：银色金属夹、圆角卡片、软阴影(2.5D/3D效果)
  文字：加粗黑体，3D立体标题，清晰的信息图表标注
  光影：左上方点光源，所有元素有高光和阴影
  边框：每个模块圆角边框 + 顶部色块标签(Tab)
  禁止：水印、边框缺失、文字错误

# 默认风格
default_style: "blueprint_lab"

