  acid_block: "cyberpunk-neon.webp"          # 前沿科技霓虹（深蓝+霓虹青绿）
  thermal: "chalkboard.webp"                 # 手绘粉笔黑板（深绿黑板+粉笔彩色）【与article/xhs/slide重名，优先article】
  aged_academia: "aged-academia.webp"        # 复古学院中世纪手抄本（羊皮纸+铁锈红+深古典绿）
  bold_graphic: "bold-graphic.webp"          # 复古漫画英雄主义（红蓝原色+黑色勾边+本戴点）
  bridge_architecture: "bridge.webp"         # 摇摆吊桥手绘流程（米白+多彩柔和色）
  circular_flow: "circular-flow.webp"         # 手绘商务木纹桌面（米黄+柔和红黄蓝）
  cladaymation: "claymation.webp"            # 黏土3D温暖手工（灰蓝鼠尾草绿+咖啡+阳光橙）
  comparison_table: "comparison-table.webp"   # 温馨手绘对照（珊瑚红vs森林绿）
  corporate_memphis: "corporate-memphis.webp" # 现代扁平商务插画（深紫+青蓝+明黄+薄荷绿）
  craft_handmade: "craft-handmade.webp"       # 剪纸叠加层析（莫兰迪色+深灰轮廓）
  do_dont: "do-dont.webp"                    # 手绘手账警示对照（米黄+森林绿+铁锈红）
  equation_style: "equation.webp"             # 复古手绘金奖章（米黄+暗金+莫兰迪色调）
  feature_list: "feature-list.webp"           # 环保手绘水彩清单（米白+草绿+柔橙+浅蓝）
  fishbone: "fishbone.webp"                  # 复古草图鱼骨逻辑（牛皮纸+莫兰迪色调）
  funnel_style: "funnel.webp"               # 营销漏斗手绘（米白+红黄蓝色系）
  grid_cards: "grid-cards.webp"             # 能力素质模型手绘（马卡龙多彩+咖啡色勾边）
