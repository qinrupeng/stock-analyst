cn_prompt_template: "{aspect_ratio}宽屏比例，{bg_style}。采用{layout_desc}：\n{topic_visual}\n\
  {ref_guide}\n标题排版规范：\n  - 主标题文字为：{main_title}（必须原封不动地呈现在图片上，不得修改、不得替换、不得省略任何一个字）\n\
  \  - 主标题位于图片顶部黄金分割线以下，居中，大字号（标题占图片总高度15%-20%）\n  - 字体视觉描述：笔画有明显的粗细对比，像铜版印刷的标题字，有历史沉淀感和权威感，类似《经济学人》《金融时报》中文标题的字体气质，拒绝无差别粗细的黑体/雅黑/综艺体\n\
  \  - 标题完整无截断，禁止使用省略号\n  - 标题颜色：纯白或纯黑，与背景形成强对比\n  - 标题排版要庄重有力，字间距适中\n每个宫格内：图标居中在上，赛道名称标注在图标下方。\n\
  所有中文标注必须正确清晰，无任何英文标签。\n质量规范：超高清渲染，大师级画质，细节清晰分明，专业金融研报质感，保留专业设计质感。禁止在图片任何位置嵌入模型签名、生成参数、版本号或任何额外文字标注。\n"
