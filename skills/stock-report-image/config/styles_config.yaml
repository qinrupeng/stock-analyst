# ============================================================
# 【核心】2x3六宫格精确布局描述（大爷验证最优格式）
# AI直接照着这个生成，不需要自己发挥
# ============================================================
grid_2x3_slot_template: |
  2.35:1宽屏比例，复古羊皮卷质感背景，寻找A股投资机会主题。
  采用2x3网格布局，每个板块有清晰边框和背景纹理：
  1. 上左格：【上中格的图标】，标注'XX'
  2. 上中格：【上中格的图标】，标注'XX'
  3. 上右格：【上中格的图标】，标注'XX'
  4. 下左格：【下中格的图标】，标注'XX'
  5. 下中格：【下中格的图标】，标注'XX'
  6. 下右格：【下中格的图标】，标注'XX'
  顶部居中大标题：'XXXX'，字体稳重清晰，整体色调统一偏暖色系，专业金融研报质感，无人物，高质量，无文字错误

# ============================================================
# hub-spoke 环形放射详细参数（5个赛道最优布局）
# ============================================================
hub_spoke_5_template: |
  2.35:1宽屏比例，【背景风格】。
  采用环形放射布局，5个圆形面板围绕中心主标题：
  - 中心：主标题文字「XXXX」
  - 左上方（约11点方向）：【图标】，标注'XX赛道'
  - 右上方（约1点方向）：【图标】，标注'XX赛道'
  - 正左侧（约9点方向）：【图标】，标注'XX赛道'
  - 正右侧（约3点方向）：【图标】，标注'XX赛道'
  - 正下方（约6点方向）：【图标】，标注'XX赛道'
  每个圆形面板：带完整金属边框，C4D渲染风格，统一光影
  整体色调：【暖色/科技蓝等】，专业金融研报质感
  禁止：边框缺失、面板截断、布局歪斜、无文字错误

# ============================================================
# 布局推荐策略（按赛道数量自动选择）
# ============================================================
layout_by_topic_count:
  1: "single_panel"
  2: "two_column"
  3: "three_column"
  4: "grid_2x2"
  5: "hub_spoke"   # 5个赛道默认环形放射
  6: "grid_2x3"    # 6个主题 → 2x3六宫格（大爷验证最优）
  7: "grid_3x3"

# 5赛道可选布局（大爷验证）
# 可通过 --layout 参数指定想要的布局
five_topic_layouts:
  default: "hub_spoke"          # 环形放射，5个面板围绕中心，均等夹角
  recommended: "top3_bottom2"   # 顶部3格 + 底部2格，均衡对称（大爷最爱）
  optional:
    - "hub_spoke"               # 环形放射
    - "top3_bottom2"            # 上3下2，均衡对称
    - "left4_right1"           # 左侧4格2x2 + 右侧1个大格
    - "fan_shaped"              # 扇形展开
